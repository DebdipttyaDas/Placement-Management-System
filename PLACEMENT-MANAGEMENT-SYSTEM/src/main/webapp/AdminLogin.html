<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<link rel="stylesheet" href="AdminLogin.css">

</head>

<body class="login-body">

<div class="page-container">
<div class="main-wrapper">

<!-- Navbar -->
<header class="navbar">

  <h1 class="logo">CampusConnect</h1>

  <div class="nav-link">
    <a href="Login.jsp">Back to home page</a>
</div>

</header>

<!-- Main -->
<main class="main-container">
<div class="content-box">

<h1 class="heading">Welcome Admin !</h1>

<p class="subtext">
<b>Secure Access for Administration Panel</b>
</p>

<!-- Card -->
<div class="glass-card card">

<input type="hidden" name="role" value="admin">

<!-- Admin ID -->
<div class="input-group">
  <label>ADMIN ID</label>
  <input name="adminId" type="text" placeholder="Enter Admin ID" style="color: white;">
</div>

<!-- Password -->
<div class="input-group">
  <div class="password-header">
    <label>PASSWORD</label>
    <a href="#">Forgot?</a>
  </div>

  <input type="password" name="password" placeholder="Enter password">
</div>

<!-- Button -->
<button type="submit" class="login-btn">
  Access Portal
</button>

</div>
</div>
</main>

</div>
</div>

</body>
</html>
