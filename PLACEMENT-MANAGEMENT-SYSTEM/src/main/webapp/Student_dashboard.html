<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your profile</title>
<link rel="stylesheet" href="Student_dashboard.css">
</head>
<body>
  <div>
    <!-- Sidebar -->
    <div>
      <h2>Student Portal</h2>

      <ul>
        <li>Dashboard</li>
        <li>Jobs</li>
        <li>Applications</li>
        <li>Profile</li>
        <li>Schedule</li>
      </ul>
      <center>
        <br>
        <br>
        <br>
        <button>Logout</button>
      </center>
    </div>

    <!-- Main Content -->
    <div>

      <!-- Header -->
      <div class="header">
        <div>
          <h1>Profile Settings</h1>
        </div>

        <div class="btn-group">
  <button>Discard Changes</button>
  <button>Save Profile</button>
</div>
      </div>

      <!-- Avatar + Personal Info -->
      <div>

        <!-- Avatar -->
        <div>
          <div><h1><b>Avatar</b></h1></div>
          <p>JPG or PNG. Max size 2MB</p>
        </div>

        <!-- Personal Info -->
        <div>
          <h2> 👤 Personal Information</h2>

          <input type="text" placeholder="Your name">
          <input type="text" placeholder="Your email">

          <input type="password" placeholder="Your password">
          <input type="password" placeholder="Confirm password">
        </div>

      </div>

      <!-- Academic + Languages -->
      <div>
        <!-- Academic -->
        <div>
          <h2> 📚 Academic Records</h2>

          <input type="text" placeholder="Department">
          <input type="text" placeholder="CGPA">
        </div>

        <!-- Languages -->
        <div>
          <h2> 🌐 Languages Known</h2>
          <input type="text" placeholder="English, Bengali, Hindi">
        </div>

      </div>

      <!-- Professional Skills -->
      <div>
        <h2> 💡Professional Skills</h2>

        <input type="text" placeholder="Programming languages (e.g: Python, Java, C++)">
        <input type="text" placeholder="Web development (e.g: HTML, CSS, JavaScript)">
        <input type="text" placeholder="Database languages (e.g: SQL, MongoDB)">
        <input type="text" placeholder="Tools and technologies (e.g: Github, VS Code)">
        <input type="text" placeholder="Other skills (e.g: Problem Solving, Teamwork)">
        
      </div>

      <!-- Achievements -->
      <div>
        <h2> 🏆 Achievements</h2>

        <input type="text" placeholder="Achievement 1">
        <input type="text" placeholder="Achievement 2">
        <input type="text" placeholder="Achievement 3">
        <input type="text" placeholder="Role / Position">
        
      </div>
    </div>
  </div>
</body>
</html>
