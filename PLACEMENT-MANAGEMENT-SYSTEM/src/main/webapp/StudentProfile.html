<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Settings</title>
<link rel="stylesheet" href="StudentProfile.css">
</head>

<body>
    <div class="container">

    <!-- Sidebar -->
    <div class="sidebar-card">
      <h2>Student Profile</h2>

      <ul>
        <li>Dashboard</li>
        <li>Jobs</li>
        <li>Applications</li>
      </ul>
      <!-- Logout button -->
      <button class="logout-btn">Logout</button>

    </div>

   <!-- Main Content -->
<div class="main-content">

    <!-- HEADER CARD -->
    <div class="header-card">
        <div class="header-left">
            <h1>Profile Settings</h1>
        </div>

        <div class="btn-group">
            <button class="nav-btn"><a href="Student_dashboard.html" class="nav-btn">Back to Dashboard</a></button>
            <button>Save Profile</button>
        </div>
    </div>

   <!-- AVATAR CARD -->
<div class="card avatar-card">
    <h2>Profile Picture</h2>
    <p>JPG or PNG. Max size 2MB</p>

    <div class="avatar-box"></div>

    <button class="upload-btn">Upload Photo</button>
</div>
    <!-- PERSONAL INFO -->
    <div class="card">
        <h2>Personal Information</h2>

        <input type="text" placeholder="Your name">
        <input type="text" placeholder="Your email">
        <input type="password" placeholder="Your password">
        <input type="password" placeholder="Confirm password">
    </div>

    <!-- ACADEMIC -->
    <div class="card">
        <h2>Academic Records</h2>

        <input type="text" placeholder="Department">
        <input type="text" placeholder="CGPA">
    </div>

    <!-- LANGUAGES -->
    <div class="card">
        <h2>Languages Known</h2>

        <input type="text" placeholder="English, Bengali, Hindi">
    </div>

    <!-- SKILLS -->
    <div class="card">
        <h2>Professional Skills</h2>

        <input type="text" placeholder="Skill 1">
        <input type="text" placeholder="Skill 2">
        <input type="text" placeholder="Skill 3">
        <input type="text" placeholder="Skill 4">
        <input type="text" placeholder="Other skills">
    </div>

</div>
</div>
</body>
</html>
