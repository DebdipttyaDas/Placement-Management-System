<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Student Portal</title>
  <link rel="stylesheet" href="Placement.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <div class="dashboard-wrapper">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <h2>Placements</h2>
      <ul>
        <li>Dashboard</li>
        <li class="active">Placements</li>
        <li>My Applications</li>
      </ul>
    </aside>

    <!-- RIGHT MAIN AREA -->
    <div class="main-area">
      <!-- TOP NAVIGATION -->
      <header class="top-nav">
        <div class="nav-right">
          <i class="fa-solid fa-circle-user"></i>
          <i class="fa-solid fa-bell"></i>
        </div>
      </header>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        
        <!-- SEARCH SECTION -->
        <div class="search-container">
          <div class="search-box">
            <input type="text" placeholder="Search for job titles or companies...">
          </div>
        </div>

        <!-- FILTER BUTTONS -->
        <div class="filter-container">
          <button class="filter-btn active">All</button>
          <button class="filter-btn">IT</button>
          <button class="filter-btn">Engineering</button>
          <button class="filter-btn">Marketing</button>
          <button class="filter-btn">Medical</button>
          <button class="filter-btn">HR</button>
        </div>

      </main>
    </div>
  </div>

</body>

</html>
